services:
  app:
    build:
      context: .
      args:
        # Baked into the browser bundle at build time — rebuild required to change
        NG_APP_PRODUCTION: ${NG_APP_PRODUCTION:-true}
        NG_APP_NAME: ${NG_APP_NAME:-Pelis Plus}
        NG_APP_INDEX_PAGE: ${NG_APP_INDEX_PAGE:-landing}
        NG_APP_POST_LOGIN_ROUTE: ${NG_APP_POST_LOGIN_ROUTE:-/landing}
        NG_APP_BACKEND_BASE_URL: ${NG_APP_BACKEND_BASE_URL:-http://localhost:8080/api}
    # Passes all vars from .env to the container at runtime.
    # Secrets (demo credentials, storage key) are read by the SSR server via process.env.
    env_file: .env
    ports:
      - "${PORT:-4000}:4000"
    environment:
      # Override env_file values that must be fixed inside the container
      PORT: 4000
      NODE_ENV: production

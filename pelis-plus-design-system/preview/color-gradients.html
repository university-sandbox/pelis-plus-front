<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Gradients & scrims</title></head>
<body style="height:240px;">
  <div class="col" style="gap:10px;">
    <div class="overline">Gradients & scrims</div>
    <div class="grid" style="grid-template-columns:repeat(4,1fr); gap:10px;">
      <div style="height:130px; border-radius:var(--r-3); background:linear-gradient(135deg, #FF2E78 0%, #7A0830 45%, #00A4BF 100%); position:relative; overflow:hidden;">
        <div style="position:absolute; left:10px; bottom:8px;" class="tag">--grad-vice</div>
      </div>
      <div style="height:130px; border-radius:var(--r-3); position:relative; overflow:hidden; background:#1C1C20;">
        <img src="../assets/poster-placeholder.svg" style="width:100%; height:100%; object-fit:cover;"/>
        <div style="position:absolute; inset:0; background: linear-gradient(180deg, rgba(5,5,6,0) 0%, rgba(5,5,6,0.85) 70%, #050506 100%);"></div>
        <div style="position:absolute; left:10px; bottom:8px;" class="tag">scrim-bottom</div>
      </div>
      <div style="height:130px; border-radius:var(--r-3); position:relative; overflow:hidden; background:radial-gradient(ellipse at top right, rgba(255,46,120,0.4), transparent 60%), #0B0B0D;">
        <div style="position:absolute; left:10px; bottom:8px;" class="tag">hero glow</div>
      </div>
      <div style="height:130px; border-radius:var(--r-3); background:linear-gradient(135deg,#F5A524,#FF2E78); position:relative;">
        <div style="position:absolute; left:10px; bottom:8px;" class="tag" style="color:#1a1a1a;">sunset pair</div>
      </div>
    </div>
    <div class="tag muted">Gradients are reserved for hero moments and poster art. Never gradient-fill a button or card border.</div>
  </div>
</body></html>

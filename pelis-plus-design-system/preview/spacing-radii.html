<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Radii</title></head>
<body style="height:220px;">
  <div class="col">
    <div class="overline">Border radii — restrained</div>
    <div style="display:flex; gap:18px; align-items:flex-end;">
      <div class="col" style="align-items:center; gap:8px;"><div style="width:80px; height:80px; background:var(--ink-3); border:1px solid var(--border); border-radius:2px;"></div><div class="tag">r-1 · 2px<br/>chips</div></div>
      <div class="col" style="align-items:center; gap:8px;"><div style="width:80px; height:80px; background:var(--ink-3); border:1px solid var(--border); border-radius:4px;"></div><div class="tag">r-2 · 4px<br/>inputs</div></div>
      <div class="col" style="align-items:center; gap:8px;"><div style="width:80px; height:80px; background:var(--ink-3); border:1px solid var(--border); border-radius:8px;"></div><div class="tag">r-3 · 8px<br/>cards</div></div>
      <div class="col" style="align-items:center; gap:8px;"><div style="width:80px; height:80px; background:var(--ink-3); border:1px solid var(--border); border-radius:12px;"></div><div class="tag">r-4 · 12px<br/>sheets</div></div>
      <div class="col" style="align-items:center; gap:8px;"><div style="width:80px; height:80px; background:var(--ink-3); border:1px solid var(--border); border-radius:20px;"></div><div class="tag">r-5 · 20px<br/>hero</div></div>
      <div class="col" style="align-items:center; gap:8px;"><div style="width:80px; height:80px; background:var(--ink-3); border:1px solid var(--border); border-radius:999px;"></div><div class="tag">pill<br/>tags · btns</div></div>
    </div>
    <div class="tag muted">Big rounding looks app-store-y, not cinema. Default to r-3 for cards; r-2 for inputs.</div>
  </div>
</body></html>

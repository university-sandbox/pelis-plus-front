<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Elevation</title></head>
<body style="height:230px; background:var(--ink-1);">
  <div class="col">
    <div class="overline">Elevation</div>
    <div class="grid" style="grid-template-columns:repeat(5,1fr); gap:18px; margin-top:4px;">
      <div class="col" style="align-items:center; gap:10px;">
        <div style="width:100px; height:80px; background:var(--ink-2); border-radius:8px; border:1px solid var(--border);"></div>
        <div class="tag" style="text-align:center;">surface<br/>ink-2 + border</div>
      </div>
      <div class="col" style="align-items:center; gap:10px;">
        <div style="width:100px; height:80px; background:var(--ink-2); border-radius:8px; box-shadow: 0 1px 2px rgba(0,0,0,0.4);"></div>
        <div class="tag" style="text-align:center;">shadow-1<br/>0 1 2 / .4</div>
      </div>
      <div class="col" style="align-items:center; gap:10px;">
        <div style="width:100px; height:80px; background:var(--ink-2); border-radius:8px; box-shadow: 0 4px 16px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.4);"></div>
        <div class="tag" style="text-align:center;">shadow-2<br/>menus, popovers</div>
      </div>
      <div class="col" style="align-items:center; gap:10px;">
        <div style="width:100px; height:80px; background:var(--ink-2); border-radius:8px; box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.4);"></div>
        <div class="tag" style="text-align:center;">shadow-3<br/>modals, sheets</div>
      </div>
      <div class="col" style="align-items:center; gap:10px;">
        <div style="width:100px; height:80px; background:var(--ink-2); border-radius:8px; box-shadow: 0 0 0 1px rgba(255,46,120,0.35), 0 8px 32px rgba(255,46,120,0.25);"></div>
        <div class="tag" style="text-align:center;">glow<br/>brand moments</div>
      </div>
    </div>
    <div class="tag muted">We mostly elevate with surface color shifts (ink-1 → ink-2 → ink-3). Shadow is supplemental.</div>
  </div>
</body></html>

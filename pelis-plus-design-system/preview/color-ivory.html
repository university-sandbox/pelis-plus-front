<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Ivory</title></head>
<body style="height:220px;">
  <div class="col">
    <div class="overline">Ivory — the projector light</div>
    <div class="grid" style="grid-template-columns:repeat(6,1fr);">
      <div class="swatch on-light" style="background:#FFFFFF"><span class="label">ivory-0</span><span class="hex">#FFFFFF</span></div>
      <div class="swatch on-light" style="background:#F6F1E7"><span class="label">ivory-1</span><span class="hex">#F6F1E7</span></div>
      <div class="swatch on-light" style="background:#D9D3C5"><span class="label">ivory-2</span><span class="hex">#D9D3C5</span></div>
      <div class="swatch on-light" style="background:#9C988D"><span class="label">ivory-3</span><span class="hex">#9C988D</span></div>
      <div class="swatch" style="background:#6B6862"><span class="label">ivory-4</span><span class="hex">#6B6862</span></div>
      <div class="swatch" style="background:#45433F"><span class="label">ivory-5</span><span class="hex">#45433F</span></div>
    </div>
    <div class="tag muted">Warm whites — never pure. ivory-1 is the default fg on dark. ivory-3 for captions / metadata.</div>
  </div>
</body></html>

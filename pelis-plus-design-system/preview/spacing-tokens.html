<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Spacing</title></head>
<body style="height:240px;">
  <div class="col">
    <div class="overline">Spacing — 4px base</div>
    <div style="display:flex; gap:14px; align-items:flex-end;">
      <div class="col" style="align-items:center; gap:6px;"><div style="width:4px;  height:60px; background:var(--marquee-400);"></div><div class="tag">s-1<br/>4</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:8px;  height:60px; background:var(--marquee-400);"></div><div class="tag">s-2<br/>8</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:12px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-3<br/>12</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:16px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-4<br/>16</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:24px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-6<br/>24</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:32px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-8<br/>32</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:48px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-12<br/>48</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:64px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-16<br/>64</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:96px; height:60px; background:var(--marquee-400);"></div><div class="tag">s-24<br/>96</div></div>
    </div>
    <div class="tag muted">Use s-4 for inline gaps, s-6 for related blocks, s-12 between sections, s-24+ for hero rhythm.</div>
  </div>
</body></html>

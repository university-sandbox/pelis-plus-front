<section class="min-h-dvh px-4 py-10 sm:px-6" style="background: var(--color-bg);" aria-labelledby="page-title">
  <mat-card class="mx-auto w-full max-w-2xl rounded-lg border shadow-sm" style="background: var(--color-surface); border-color: var(--color-border);">
    <mat-card-content class="p-6 sm:p-8">
      <header class="mb-6 border-b pb-4" style="border-color: var(--color-border);">
        <p class="pelis-overline">{{ brandName() }}</p>
        <h1 id="page-title" class="pelis-display mt-2 text-4xl" style="color: var(--color-text-primary);">{{ title() }}</h1>

        @if (subtitle()) {
          <p class="mt-3 max-w-2xl text-sm leading-6" style="color: var(--color-text-secondary);">{{ subtitle() }}</p>
        }
      </header>

      <div class="grid gap-4">
        <ng-content />
      </div>
    </mat-card-content>
  </mat-card>
</section>

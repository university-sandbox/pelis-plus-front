<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  style="background: rgba(0, 0, 0, 0.7)"
  (click)="onBackdrop($event)"
  (keydown.escape)="cancelled.emit()"
  tabindex="-1"
  role="dialog"
  aria-modal="true"
>
  <div
    class="relative w-full max-w-lg overflow-y-auto rounded-2xl"
    style="background: var(--color-surface); border: 1px solid var(--color-border)"
  >
    <div
      class="flex items-center justify-between px-6 py-4"
      style="border-bottom: 1px solid var(--color-border)"
    >
      <h2 class="text-base font-bold" style="color: var(--color-text-primary)">
        {{ screening() ? 'Editar función' : 'Nueva función' }}
      </h2>
      <button
        type="button"
        (click)="cancelled.emit()"
        style="color: var(--color-text-secondary)"
        aria-label="Cerrar"
      >
        <lucide-icon [img]="X" [size]="18" />
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="p-6 space-y-4">
      <!-- Movie -->
      <div>
        <label
          class="mb-1 block text-xs font-semibold"
          style="color: var(--color-text-secondary)"
          for="screening-movie"
          >Película *</label
        >
        <select
          id="screening-movie"
          formControlName="movieId"
          class="form-input w-full rounded-lg px-3 py-2 text-sm"
          style="
            background: var(--color-surface-raised);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
          "
        >
          <option value="">Seleccionar película</option>
          @for (m of movies(); track m.id) {
            <option [value]="m.id">{{ m.title }}</option>
          }
        </select>
      </div>

      <!-- Room -->
      <div>
        <label
          class="mb-1 block text-xs font-semibold"
          style="color: var(--color-text-secondary)"
          for="screening-venue"
          >Sede / Sala *</label
        >
        <div class="grid grid-cols-2 gap-2">
          <select
            id="screening-venue"
            [value]="selectedVenueId()"
            (change)="onVenueChange($event)"
            class="form-input rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          >
            <option value="">Sede</option>
            @for (v of venues(); track v.id) {
              <option [value]="v.id">{{ v.name }}</option>
            }
          </select>
          <select
            id="screening-room"
            aria-label="Sala"
            formControlName="roomId"
            (change)="onRoomChange($event)"
            class="form-input rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          >
            <option value="">Sala</option>
            @for (r of rooms(); track r.id) {
              <option [value]="r.id">{{ r.name }} · {{ r.roomType?.name ?? 'Sin tipo' }}</option>
            }
          </select>
        </div>
        @if (selectedRoom(); as room) {
          <p class="mt-2 text-xs" style="color: var(--color-text-secondary)">
            {{ room.capacity }} butacas · formato base
            {{ room.roomType?.name ?? room.roomType?.code ?? 'sin tipo' }}
          </p>
        }
      </div>

      <div class="grid grid-cols-2 gap-4">
        <!-- Date -->
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="screening-date"
            >Fecha *</label
          >
          <input
            id="screening-date"
            formControlName="date"
            type="date"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          />
        </div>
        <!-- Time -->
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="screening-time"
            >Hora *</label
          >
          <input
            id="screening-time"
            formControlName="time"
            type="time"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          />
        </div>
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="screening-format"
            >Formato opcional</label
          >
          <input
            id="screening-format"
            formControlName="format"
            type="text"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
            [placeholder]="inheritedFormat() || 'Usar tipo de sala'"
          />
          <p class="mt-1 text-xs" style="color: var(--color-text-disabled)">
            Déjalo vacío para usar el código del tipo de sala.
          </p>
        </div>
        <!-- Price -->
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="screening-price"
            >Precio (S/) *</label
          >
          <input
            id="screening-price"
            formControlName="price"
            type="number"
            step="0.5"
            min="0"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
            placeholder="22.00"
          />
        </div>
      </div>

      @if (serverError()) {
        <p
          class="rounded-lg px-3 py-2 text-sm"
          style="background: rgba(239, 68, 68, 0.1); color: var(--color-error)"
        >
          {{ serverError() }}
        </p>
      }

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="rounded-full border px-5 py-2 text-sm font-medium"
          style="border-color: var(--color-border-strong); color: var(--color-text-secondary)"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="submitting() || form.invalid"
          class="flex items-center gap-2 rounded-full px-5 py-2 text-sm font-semibold disabled:opacity-50"
          style="background: var(--color-accent); color: var(--color-text-inverse)"
        >
          <lucide-icon [img]="Save" [size]="14" />
          {{ submitting() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  style="background: rgba(0, 0, 0, 0.74)"
  (click)="onBackdrop($event)"
  (keydown.escape)="cancelled.emit()"
  tabindex="-1"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="roomType() ? 'Editar tipo de sala' : 'Nuevo tipo de sala'"
>
  <div
    class="relative w-full max-w-lg rounded-2xl"
    style="
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-modal);
    "
  >
    <div
      class="flex items-center justify-between px-6 py-4"
      style="border-bottom: 1px solid var(--color-border)"
    >
      <div>
        <p class="pelis-overline">Catálogo</p>
        <h2 class="text-base font-bold" style="color: var(--color-text-primary)">
          {{ roomType() ? 'Editar tipo de sala' : 'Nuevo tipo de sala' }}
        </h2>
      </div>
      <button
        type="button"
        (click)="cancelled.emit()"
        style="color: var(--color-text-secondary)"
        aria-label="Cerrar"
      >
        <lucide-icon [img]="X" [size]="18" aria-hidden="true" />
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 p-6">
      <div class="grid gap-4 sm:grid-cols-[0.85fr_1fr]">
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="room-type-code"
          >
            Código *
          </label>
          <input
            id="room-type-code"
            formControlName="code"
            type="text"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
            placeholder="imax"
          />
        </div>
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="room-type-name"
          >
            Nombre *
          </label>
          <input
            id="room-type-name"
            formControlName="name"
            type="text"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
            placeholder="IMAX"
          />
        </div>
      </div>

      <div>
        <label
          class="mb-1 block text-xs font-semibold"
          style="color: var(--color-text-secondary)"
          for="room-type-description"
        >
          Descripción *
        </label>
        <textarea
          id="room-type-description"
          formControlName="description"
          rows="3"
          class="form-input w-full rounded-lg px-3 py-2 text-sm"
          style="
            background: var(--color-surface-raised);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
          "
          placeholder="Pantalla de gran formato y audio inmersivo."
        ></textarea>
      </div>

      <label
        class="flex items-center gap-3 rounded-lg px-3 py-2"
        style="background: var(--color-surface-raised); color: var(--color-text-secondary)"
      >
        <input
          formControlName="active"
          type="checkbox"
          class="size-4 accent-[var(--color-accent)]"
        />
        <span class="text-sm font-medium">Disponible para nuevas salas y funciones</span>
      </label>

      @if (serverError()) {
        <p
          class="rounded-lg px-3 py-2 text-sm"
          style="background: rgba(255, 90, 90, 0.12); color: var(--color-error)"
        >
          {{ serverError() }}
        </p>
      }

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="rounded-full border px-5 py-2 text-sm font-medium"
          style="border-color: var(--color-border-strong); color: var(--color-text-secondary)"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="submitting() || form.invalid"
          class="flex items-center gap-2 rounded px-5 py-2 text-sm font-extrabold disabled:opacity-50"
          style="
            background: var(--color-accent);
            color: var(--color-text-inverse);
            box-shadow: var(--shadow-glow);
          "
        >
          <lucide-icon [img]="Save" [size]="14" aria-hidden="true" />
          {{ submitting() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

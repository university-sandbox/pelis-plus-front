<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  style="background: rgba(0, 0, 0, 0.74)"
  (click)="onBackdrop($event)"
  (keydown.escape)="cancelled.emit()"
  tabindex="-1"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="layout() ? 'Editar distribución de sala' : 'Nueva distribución de sala'"
>
  <div
    class="relative w-full max-w-lg rounded-2xl"
    style="
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-modal);
    "
  >
    <div
      class="flex items-center justify-between px-6 py-4"
      style="border-bottom: 1px solid var(--color-border)"
    >
      <div>
        <p class="pelis-overline">Butacas</p>
        <h2 class="text-base font-bold" style="color: var(--color-text-primary)">
          {{ layout() ? 'Editar distribución' : 'Nueva distribución' }}
        </h2>
      </div>
      <button
        type="button"
        (click)="cancelled.emit()"
        style="color: var(--color-text-secondary)"
        aria-label="Cerrar"
      >
        <lucide-icon [img]="X" [size]="18" aria-hidden="true" />
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 p-6">
      <div>
        <label
          class="mb-1 block text-xs font-semibold"
          style="color: var(--color-text-secondary)"
          for="layout-name"
        >
          Nombre *
        </label>
        <input
          id="layout-name"
          formControlName="name"
          type="text"
          class="form-input w-full rounded-lg px-3 py-2 text-sm"
          style="
            background: var(--color-surface-raised);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
          "
          placeholder="Distribución VIP 6x8"
        />
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="layout-rows"
          >
            Filas *
          </label>
          <input
            id="layout-rows"
            formControlName="rows"
            type="number"
            min="1"
            max="40"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          />
        </div>
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="layout-cols"
          >
            Columnas *
          </label>
          <input
            id="layout-cols"
            formControlName="cols"
            type="number"
            min="1"
            max="40"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          />
        </div>
        <div>
          <label
            class="mb-1 block text-xs font-semibold"
            style="color: var(--color-text-secondary)"
            for="layout-capacity"
          >
            Aforo *
          </label>
          <input
            id="layout-capacity"
            formControlName="capacity"
            type="number"
            min="1"
            class="form-input w-full rounded-lg px-3 py-2 text-sm"
            style="
              background: var(--color-surface-raised);
              border: 1px solid var(--color-border);
              color: var(--color-text-primary);
            "
          />
        </div>
      </div>

      <div
        class="rounded-lg p-3"
        style="background: rgba(255, 46, 120, 0.1); border: 1px solid rgba(255, 46, 120, 0.24)"
      >
        <p
          class="text-xs font-semibold uppercase tracking-widest"
          style="color: var(--color-accent)"
        >
          Mapa generado
        </p>
        <p class="mt-1 text-sm" style="color: var(--color-text-secondary)">
          {{ rows() }} filas por {{ cols() }} columnas. El backend generará las butacas de cada
          función con esta matriz.
        </p>
      </div>

      <label
        class="flex items-center gap-3 rounded-lg px-3 py-2"
        style="background: var(--color-surface-raised); color: var(--color-text-secondary)"
      >
        <input
          formControlName="active"
          type="checkbox"
          class="size-4 accent-[var(--color-accent)]"
        />
        <span class="text-sm font-medium">Disponible para nuevas salas</span>
      </label>

      @if (serverError()) {
        <p
          class="rounded-lg px-3 py-2 text-sm"
          style="background: rgba(255, 90, 90, 0.12); color: var(--color-error)"
        >
          {{ serverError() }}
        </p>
      }

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="rounded-full border px-5 py-2 text-sm font-medium"
          style="border-color: var(--color-border-strong); color: var(--color-text-secondary)"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="submitting() || form.invalid"
          class="flex items-center gap-2 rounded px-5 py-2 text-sm font-extrabold disabled:opacity-50"
          style="
            background: var(--color-accent);
            color: var(--color-text-inverse);
            box-shadow: var(--shadow-glow);
          "
        >
          <lucide-icon [img]="Save" [size]="14" aria-hidden="true" />
          {{ submitting() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

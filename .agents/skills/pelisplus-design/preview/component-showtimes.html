<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Showtimes</title></head>
<body style="height:260px;">
  <style>
    .time {
      display:inline-flex; flex-direction:column; align-items:center;
      padding: 10px 16px; min-width: 78px;
      border: 1px solid var(--border-strong); border-radius: 4px;
      background: var(--ink-2); cursor: pointer;
      transition: border-color var(--dur-fast), background var(--dur-fast);
    }
    .time:hover { border-color: var(--marquee-400); background: var(--ink-3); }
    .time .hr { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.04em; color: var(--ivory-1); }
    .time .fmt { font-size: 10px; letter-spacing: 0.12em; color: var(--ivory-3); margin-top: 2px; }
    .time.sel { background: var(--marquee-400); border-color: var(--marquee-400); }
    .time.sel .hr, .time.sel .fmt { color: var(--ivory-1); }
    .time.sold { opacity: 0.4; cursor: not-allowed; }
    .time.sold .hr { text-decoration: line-through; }
    .day {
      display:inline-flex; flex-direction:column; align-items:center;
      padding: 8px 12px; border-radius: 4px; cursor: pointer; min-width: 58px;
      background: transparent; color: var(--ivory-2);
    }
    .day .dow { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ivory-3); }
    .day .dn { font-family: var(--font-display); font-size: 22px; line-height: 1; margin-top: 2px; }
    .day.sel { background: var(--ink-3); color: var(--ivory-1); }
    .day.sel .dow { color: var(--marquee-300); }
  </style>
  <div class="col" style="gap:12px;">
    <div class="overline">Date strip</div>
    <div class="row" style="gap:6px;">
      <span class="day"><span class="dow">Lun</span><span class="dn">19</span></span>
      <span class="day sel"><span class="dow">Hoy</span><span class="dn">20</span></span>
      <span class="day"><span class="dow">Mié</span><span class="dn">21</span></span>
      <span class="day"><span class="dow">Jue</span><span class="dn">22</span></span>
      <span class="day"><span class="dow">Vie</span><span class="dn">23</span></span>
      <span class="day"><span class="dow">Sáb</span><span class="dn">24</span></span>
      <span class="day"><span class="dow">Dom</span><span class="dn">25</span></span>
    </div>
    <div class="overline" style="margin-top:6px;">Showtimes — Sala 4 · IMAX</div>
    <div class="row" style="gap:8px; flex-wrap:wrap;">
      <span class="time sold"><span class="hr">14:30</span><span class="fmt">VOSE</span></span>
      <span class="time"><span class="hr">17:00</span><span class="fmt">DOBLADA</span></span>
      <span class="time sel"><span class="hr">20:30</span><span class="fmt">VOSE</span></span>
      <span class="time"><span class="hr">23:15</span><span class="fmt">VOSE</span></span>
    </div>
    <div class="tag muted">Selected showtime turns magenta. Sold-out times are 40% opacity with a strike-through.</div>
  </div>
</body></html>

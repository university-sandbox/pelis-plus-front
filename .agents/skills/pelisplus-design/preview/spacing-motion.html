<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Motion</title></head>
<body style="height:240px;">
  <style>
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--marquee-400);
      animation: travel 2.4s infinite;
    }
    @keyframes travel {
      0%, 8% { transform: translateX(0); }
      50%    { transform: translateX(240px); }
      92%,100%{ transform: translateX(0); }
    }
    .e1 { animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
    .e2 { animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1); }
    .e3 { animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
    .e4 { animation-timing-function: linear; }
    .track {
      width: 260px; height: 14px;
      border-bottom: 1px dashed var(--border);
      position: relative; margin-bottom: 8px;
    }
  </style>
  <div class="col">
    <div class="overline">Motion — cinematic easing</div>
    <div class="grid" style="grid-template-columns:1fr 1fr; gap:8px 24px; margin-top:4px;">
      <div><div class="track"><div class="dot e1"></div></div><div class="tag">ease-out · dolly out · default UI</div></div>
      <div><div class="track"><div class="dot e2"></div></div><div class="tag">ease-in-out · scene change</div></div>
      <div><div class="track"><div class="dot e3"></div></div><div class="tag">spring · sparingly · success states</div></div>
      <div><div class="track"><div class="dot e4"></div></div><div class="tag">linear · progress, scrub</div></div>
    </div>
    <div class="tag muted">Durations: 120ms (micro), 220ms (default), 420ms (page), 800ms (scene). No bouncy springs in production UI.</div>
  </div>
</body></html>

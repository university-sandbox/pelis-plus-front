<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Marquee</title></head>
<body style="height:240px;">
  <div class="col">
    <div class="row" style="justify-content:space-between; align-items:baseline;">
      <div class="overline" style="color:var(--marquee-300);">Marquee — primary accent</div>
      <div class="tag">--accent · use sparingly</div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(8,1fr);">
      <div class="swatch on-light" style="background:#FFE6F0"><span class="label">50</span></div>
      <div class="swatch on-light" style="background:#FFB8D5"><span class="label">100</span></div>
      <div class="swatch on-light" style="background:#FF7AAE"><span class="label">200</span></div>
      <div class="swatch on-light" style="background:#FF4A8F"><span class="label">300</span></div>
      <div class="swatch" style="background:#FF2E78; outline:2px solid rgba(255,255,255,0.18); outline-offset:-3px;"><span class="label">400</span><span class="hex">#FF2E78</span></div>
      <div class="swatch" style="background:#E51862"><span class="label">500</span></div>
      <div class="swatch" style="background:#B30E4A"><span class="label">600</span></div>
      <div class="swatch" style="background:#7A0830"><span class="label">700</span></div>
    </div>
    <div class="tag muted">marquee-400 is the brand red. -300 = hover, -500 = pressed, -700 = deep bg accents.</div>
  </div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Amber + Cyan</title></head>
<body style="height:260px;">
  <div class="col" style="gap:10px;">
    <div class="overline">Amber — marquee bulbs / ratings / warnings</div>
    <div class="grid" style="grid-template-columns:repeat(6,1fr);">
      <div class="swatch on-light" style="background:#FFF4DC"><span class="label">50</span></div>
      <div class="swatch on-light" style="background:#FFE0A1"><span class="label">100</span></div>
      <div class="swatch on-light" style="background:#FFC047"><span class="label">300</span></div>
      <div class="swatch on-light" style="background:#F5A524"><span class="label">400</span><span class="hex">#F5A524</span></div>
      <div class="swatch" style="background:#C77F0C"><span class="label">500</span></div>
      <div class="swatch" style="background:#7A4D00"><span class="label">700</span></div>
    </div>
    <div class="overline" style="margin-top:6px; color:var(--cyan-400);">Cyan — vice contrast (poster pairings only)</div>
    <div class="grid" style="grid-template-columns:repeat(6,1fr);">
      <div class="swatch on-light" style="background:#5CEEFF"><span class="label">300</span></div>
      <div class="swatch on-light" style="background:#00D6F5"><span class="label">400</span><span class="hex">#00D6F5</span></div>
      <div class="swatch" style="background:#00A4BF"><span class="label">500</span></div>
      <div class="swatch" style="background:#006A7D"><span class="label">700</span></div>
      <div class="swatch" style="background:linear-gradient(135deg,#FF2E78,#00A4BF)"><span class="label">vice pair</span></div>
      <div class="swatch" style="background:linear-gradient(135deg,#F5A524,#FF2E78)"><span class="label">sunset</span></div>
    </div>
  </div>
</body></html>

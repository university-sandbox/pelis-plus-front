<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Ink</title></head>
<body style="height:220px;">
  <div class="col">
    <div class="overline">Ink — the canvas</div>
    <div class="grid" style="grid-template-columns:repeat(6,1fr);">
      <div class="swatch" style="background:#050506"><span class="label">ink-0</span><span class="hex">#050506</span></div>
      <div class="swatch" style="background:#0B0B0D"><span class="label">ink-1</span><span class="hex">#0B0B0D</span></div>
      <div class="swatch" style="background:#131316"><span class="label">ink-2</span><span class="hex">#131316</span></div>
      <div class="swatch" style="background:#1C1C20"><span class="label">ink-3</span><span class="hex">#1C1C20</span></div>
      <div class="swatch" style="background:#26262B"><span class="label">ink-4</span><span class="hex">#26262B</span></div>
      <div class="swatch" style="background:#34343A"><span class="label">ink-5</span><span class="hex">#34343A</span></div>
    </div>
    <div class="tag muted">Near-blacks with a warm undertone. ink-1 = default page bg. ink-2 = cards. ink-3 = inputs / hover.</div>
  </div>
</body></html>

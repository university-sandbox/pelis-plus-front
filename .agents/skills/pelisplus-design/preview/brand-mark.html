<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Mark</title></head>
<body style="height:240px;">
  <div class="row" style="gap:24px; align-items:center; justify-content:space-around; height:100%;">
    <div class="col" style="align-items:center; gap:10px; color:var(--ivory-1);">
      <img src="../assets/logo-mark.svg" style="width:80px; height:80px;"/>
      <div class="tag">on ink (default)</div>
    </div>
    <div class="col" style="align-items:center; gap:10px; color:var(--ivory-1); padding:14px; background:#FF2E78; border-radius:8px;">
      <img src="../assets/logo-mark.svg" style="width:80px; height:80px; color:var(--ivory-1);"/>
      <div class="tag" style="color: rgba(255,255,255,0.85);">on marquee</div>
    </div>
    <div class="col" style="align-items:center; gap:10px; color:var(--ink-0); padding:14px; background:var(--ivory-1); border-radius:8px;">
      <img src="../assets/logo-mark.svg" style="width:80px; height:80px;"/>
      <div class="tag" style="color: rgba(0,0,0,0.6);">on ivory</div>
    </div>
    <div class="col" style="align-items:center; gap:10px; color:var(--ivory-1);">
      <img src="../assets/logo-mark.svg" style="width:36px; height:36px;"/>
      <div class="tag">favicon size</div>
    </div>
  </div>
</body></html>
